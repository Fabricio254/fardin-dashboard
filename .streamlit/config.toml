[client]
toolbarMode = "viewer"
showErrorDetails = false
sidebarState = "expanded"
showSidebarNavigation = false
themeBase = "dark"

[logger]
level = "warning"

[browser]
gatherUsageStats = false

[server]
headless = true
enableXsrfProtection = true
maxUploadSize = 50

[theme]
base = "dark"
primaryColor = "#ef4444"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#111827"
textColor = "#e5e7eb"
font = "sans serif"